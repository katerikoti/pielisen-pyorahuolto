<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Hallintapaneeli – Pielisen Pyörähuolto</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--blue:#1E3A5F;--blue-light:#2a5080;--yellow:#F5C518;--yellow-dark:#d4a900;--gray:#f7f8fa;--text:#1a1a1a;--muted:#555;--border:#e2e6ea;--white:#fff;--red:#c0392b;--green:#1a7a4a}
body{font-family:system-ui,-apple-system,sans-serif;color:var(--text);font-size:16px;line-height:1.6;background:var(--gray);min-height:100vh}

/* LOGIN */
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:2rem}
.login-card{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:2.5rem;width:100%;max-width:380px;text-align:center}
.login-logo{font-size:1.1rem;font-weight:700;color:var(--blue);margin-bottom:.25rem}
.login-logo span{color:var(--yellow)}
.login-card h2{font-size:1.4rem;font-weight:800;margin-bottom:.4rem;color:var(--text)}
.login-card p{font-size:.88rem;color:var(--muted);margin-bottom:2rem}
.login-card input{width:100%;padding:.75rem 1rem;border:1px solid var(--border);border-radius:8px;font-size:1rem;margin-bottom:.75rem;outline:none;transition:border-color .2s}
.login-card input:focus{border-color:var(--blue)}
.login-card button{width:100%;background:var(--blue);color:var(--white);font-weight:700;font-size:1rem;padding:.8rem;border:none;border-radius:8px;cursor:pointer;transition:background .2s}
.login-card button:hover{background:var(--blue-light)}
.login-err{color:var(--red);font-size:.85rem;margin-top:.5rem;display:none}

/* APP */
#app{display:none}
header{background:var(--blue);padding:0 2rem;height:60px;display:flex;align-items:center;justify-content:space-between}
.h-logo{color:var(--white);font-weight:700;font-size:1rem}
.h-logo span{color:var(--yellow)}
.h-right{display:flex;align-items:center;gap:1rem}
.h-site{color:rgba(255,255,255,.7);text-decoration:none;font-size:.85rem}
.h-site:hover{color:var(--yellow)}
.btn-logout{background:transparent;border:1px solid rgba(255,255,255,.3);color:rgba(255,255,255,.8);font-size:.82rem;padding:.35rem .85rem;border-radius:6px;cursor:pointer}
.btn-logout:hover{border-color:rgba(255,255,255,.6)}

main{max-width:820px;margin:0 auto;padding:2.5rem 1.5rem}

.panel{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:1.75rem;margin-bottom:1.5rem}
.panel-title{font-size:1.05rem;font-weight:800;color:var(--text);margin-bottom:1.25rem;padding-bottom:.75rem;border-bottom:1px solid var(--border)}

label{display:block;font-size:.85rem;font-weight:700;color:var(--text);margin-bottom:.35rem}
input[type=text],input[type=date],textarea{width:100%;padding:.7rem 1rem;border:1px solid var(--border);border-radius:8px;font-size:.95rem;font-family:inherit;outline:none;transition:border-color .2s;color:var(--text)}
input:focus,textarea:focus{border-color:var(--blue)}
textarea{resize:vertical;min-height:100px;line-height:1.55}
.field{margin-bottom:1rem}

.form-row{display:flex;gap:1rem;flex-wrap:wrap}
.form-row .field{flex:1;min-width:180px}

.btn-post{background:var(--blue);color:var(--white);font-weight:700;padding:.75rem 1.75rem;border:none;border-radius:8px;font-size:.95rem;cursor:pointer;transition:background .2s}
.btn-post:hover{background:var(--blue-light)}
.btn-post:disabled{opacity:.5;cursor:not-allowed}

.toast{position:fixed;bottom:2rem;right:2rem;background:var(--green);color:var(--white);padding:.75rem 1.25rem;border-radius:8px;font-size:.9rem;font-weight:600;opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none;z-index:999}
.toast.show{opacity:1;transform:translateY(0)}

.posts-list{display:flex;flex-direction:column;gap:.75rem}
.post-item{border:1px solid var(--border);border-radius:10px;padding:1.1rem 1.25rem;display:flex;align-items:flex-start;gap:1rem;background:var(--white)}
.post-item.hidden-post{background:var(--gray);border-style:dashed}
.post-meta{flex:1;min-width:0}
.post-title{font-weight:700;font-size:.97rem;color:var(--text);margin-bottom:.2rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.post-date{font-size:.78rem;color:var(--muted)}
.post-body{font-size:.85rem;color:var(--muted);margin-top:.3rem;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.post-actions{display:flex;gap:.5rem;flex-shrink:0;align-items:center}
.badge{font-size:.72rem;font-weight:700;padding:.2rem .6rem;border-radius:12px;letter-spacing:.3px}
.badge-pub{background:#d4edda;color:#155724}
.badge-hid{background:#e2e3e5;color:#383d41}
.btn-sm{font-size:.8rem;padding:.35rem .8rem;border-radius:6px;border:1px solid var(--border);background:var(--white);cursor:pointer;font-weight:600;transition:all .2s;white-space:nowrap}
.btn-toggle{color:var(--blue);border-color:var(--blue)}
.btn-toggle:hover{background:var(--blue);color:var(--white)}
.btn-del{color:var(--red);border-color:transparent}
.btn-del:hover{background:#fdecea;border-color:#f5c6c6}

.empty-posts{color:var(--muted);font-size:.9rem;padding:.5rem 0}

.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-bottom:1.5rem}
.stat-box{background:var(--gray);border-radius:10px;padding:1rem 1.25rem;text-align:center}
.stat-num{font-size:1.8rem;font-weight:800;color:var(--blue)}
.stat-lbl{font-size:.78rem;color:var(--muted);margin-top:.1rem}

@media(max-width:500px){
  header{padding:0 1.25rem}
  main{padding:1.5rem 1rem}
  .panel{padding:1.25rem}
  .stats-row{grid-template-columns:1fr 1fr}
  .post-actions{flex-direction:column;align-items:flex-end}
}

/* TABS */
.tab-bar{display:flex;gap:.5rem;margin-bottom:1.5rem}
.tab-btn{font-size:.92rem;font-weight:700;padding:.5rem 1.35rem;border:1.5px solid var(--border);border-radius:8px;background:var(--white);color:var(--muted);cursor:pointer;transition:all .15s}
.tab-btn:hover{border-color:var(--blue);color:var(--blue)}
.tab-btn.active{background:var(--blue);border-color:var(--blue);color:var(--white)}

/* BOOKINGS */
.bk-filter{font-size:.78rem;font-weight:600;padding:.3rem .85rem;border:1.5px solid var(--border);border-radius:20px;background:var(--white);color:var(--muted);cursor:pointer;transition:all .15s}
.bk-filter:hover{border-color:var(--blue);color:var(--blue)}
.bk-filter.active{background:var(--blue);border-color:var(--blue);color:var(--white)}
.bk-loading,.bk-empty{color:var(--muted);font-size:.9rem;padding:1.5rem 0}
.bk-err{background:#fdecea;border:1px solid #f5c6c6;border-radius:8px;padding:1rem;font-size:.88rem;color:var(--red)}
.bk-card{border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:.75rem;background:var(--white)}
.bk-head{display:flex;align-items:center;justify-content:space-between;padding:.7rem 1rem;background:var(--gray);gap:.5rem;flex-wrap:wrap}
.bk-date{font-weight:700;font-size:.92rem;color:var(--text)}
.bk-time{font-weight:700;font-size:.92rem;color:var(--blue)}
.bk-info{padding:.7rem 1rem;font-size:.88rem;line-height:1.65;border-bottom:1px solid #f2f2f2}
.bk-info a{color:var(--blue);text-decoration:none}
.bk-info a:hover{text-decoration:underline}
.bk-actions{padding:.6rem 1rem;display:flex;gap:.4rem;flex-wrap:wrap}
.bk-btn{font-size:.78rem;font-weight:600;padding:.28rem .7rem;border-radius:6px;border:1px solid var(--border);background:var(--white);cursor:pointer;transition:all .15s}
.bk-valmis:hover{background:#cce5ff;border-color:#b8daff;color:#004085}
.bk-peru:hover{background:#fdecea;border-color:#f5c6c6;color:var(--red)}
.bk-palauta:hover{background:#fff3cd;border-color:#ffeeba;color:#856404}
.tl-uusi{display:inline-block;padding:.18rem .6rem;border-radius:10px;font-size:.74rem;font-weight:700;background:#fff3cd;color:#856404}
.tl-vahv{display:inline-block;padding:.18rem .6rem;border-radius:10px;font-size:.74rem;font-weight:700;background:#d4edda;color:#155724}
.tl-valmis{display:inline-block;padding:.18rem .6rem;border-radius:10px;font-size:.74rem;font-weight:700;background:#cce5ff;color:#004085}
.tl-per{display:inline-block;padding:.18rem .6rem;border-radius:10px;font-size:.74rem;font-weight:700;background:#e2e3e5;color:#383d41}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo"><span>Pielisen</span> Pyörähuolto</div>
    <h2>Hallintapaneeli</h2>
    <p>Kirjaudu sisään julkaistaksesi uutisia</p>
    <label for="pw">Salasana</label>
    <input type="password" id="pw" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()">
    <button onclick="login()">Kirjaudu sisään</button>
    <div class="login-err" id="login-err">Väärä salasana. Yritä uudelleen.</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div class="h-logo"><span>Pielisen</span> Pyörähuolto - Hallinta</div>
    <div class="h-right">
      <a class="h-site" href="index.html" target="_blank">&#8599; Avaa sivusto</a>
      <button class="btn-logout" onclick="logout()">Kirjaudu ulos</button>
    </div>
  </header>

  <main>
    <div class="stats-row">
      <div class="stat-box"><div class="stat-num" id="s-total">0</div><div class="stat-lbl">Julkaisuja yhteensä</div></div>
      <div class="stat-box"><div class="stat-num" id="s-pub">0</div><div class="stat-lbl">Näkyvissä</div></div>
      <div class="stat-box"><div class="stat-num" id="s-hid">0</div><div class="stat-lbl">Piilotettu</div></div>
    </div>

    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('varaukset',this)">Varaukset</button>
      <button class="tab-btn" onclick="switchTab('uutiset',this)">Uutiset</button>
    </div>

    <div id="tab-varaukset" class="tab-panel">
      <div class="panel">
        <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.75rem;margin-bottom:1.25rem;padding-bottom:.75rem;border-bottom:1px solid var(--border)">
          <span style="font-size:1.05rem;font-weight:800">Varaukset</span>
          <div style="display:flex;gap:.4rem">
            <button class="bk-filter active" onclick="setBkFilter('tulevat',this)">Tulevat</button>
            <button class="bk-filter" onclick="setBkFilter('menneet',this)">Menneet</button>
            <button class="bk-filter" onclick="setBkFilter('kaikki',this)">Kaikki</button>
          </div>
        </div>
        <div id="bk-area"><p class="bk-loading">Kirjaudu sisään ladataksesi varaukset.</p></div>
      </div>
    </div><!-- /tab-varaukset -->

    <div id="tab-uutiset" class="tab-panel" style="display:none">
    <div class="panel">
      <div class="panel-title">&#43; Uusi julkaisu</div>
      <div class="field"><label for="f-title">Otsikko</label><input type="text" id="f-title" placeholder="esim. Keväthuolto alkaa!"></div>
      <div class="field"><label for="f-body">Teksti</label><textarea id="f-body" placeholder="Kirjoita lyhyt tiedote tai uutinen tähän..."></textarea></div>
      <div class="form-row">
        <div class="field"><label for="f-date">Päivämäärä</label><input type="date" id="f-date"></div>
      </div>
      <button class="btn-post" onclick="addPost()">Julkaise uutinen</button>
    </div>

    <div class="panel">
      <div class="panel-title">Julkaisut</div>
      <div class="posts-list" id="posts-list"></div>
    </div>
    </div><!-- /tab-uutiset -->
  </main>
</div>

<div class="toast" id="toast"></div>

<script>
const PW_HASH='a1d182d125869e9e5df6cff0f27f9d194e61793c90183ae0b5b86a0bc87ea4fc';
let posts=[];
const months=['tammikuuta','helmikuuta','maaliskuuta','huhtikuuta','toukokuuta','kesäkuuta','heinäkuuta','elokuuta','syyskuuta','lokakuuta','marraskuuta','joulukuuta'];

function fmtDate(d){const dt=new Date(d);return `${dt.getDate()}. ${months[dt.getMonth()]} ${dt.getFullYear()}`}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500)}

async function loadPosts(){
  try{
    const r=await fetch(`uutiset-api.php?token=${PW_HASH}`);
    const data=await r.json();
    posts=data.posts||[];
  }catch(e){posts=[];}
  renderPosts();
}

function updateStats(){
  const pub=posts.filter(p=>p.published).length;
  document.getElementById('s-total').textContent=posts.length;
  document.getElementById('s-pub').textContent=pub;
  document.getElementById('s-hid').textContent=posts.length-pub;
}

function renderPosts(){
  const el=document.getElementById('posts-list');
  const sorted=[...posts].sort((a,b)=>new Date(b.date)-new Date(a.date));
  if(!sorted.length){el.innerHTML='<p class="empty-posts">Ei julkaisuja vielä. Lisää ensimmäinen uutinen yllä.</p>';updateStats();return;}
  el.innerHTML=sorted.map(p=>`
    <div class="post-item ${p.published?'':'hidden-post'}" id="pi-${p.id}">
      <div class="post-meta">
        <div style="display:flex;align-items:center;gap:.5rem;margin-bottom:.15rem">
          <span class="badge ${p.published?'badge-pub':'badge-hid'}">${p.published?'Näkyvissä':'Piilotettu'}</span>
          <span class="post-date">${fmtDate(p.date)}</span>
        </div>
        <div class="post-title">${esc(p.title)}</div>
        <div class="post-body">${esc(p.body)}</div>
      </div>
      <div class="post-actions">
        <button class="btn-sm btn-toggle" onclick="togglePost(${p.id})">${p.published?'Piilota':'Näytä'}</button>
        <button class="btn-sm btn-del" onclick="deletePost(${p.id})">Poista</button>
      </div>
    </div>
  `).join('');
  updateStats();
}

async function addPost(){
  const title=document.getElementById('f-title').value.trim();
  const body=document.getElementById('f-body').value.trim();
  const date=document.getElementById('f-date').value;
  if(!title){alert('Lisää otsikko.');return;}
  if(!body){alert('Lisää teksti.');return;}
  if(!date){alert('Valitse päivämäärä.');return;}
  const btn=document.querySelector('.btn-post');
  btn.disabled=true;
  const fd=new FormData();
  fd.append('token',PW_HASH);fd.append('action','add');
  fd.append('title',title);fd.append('body',body);fd.append('date',date);
  const r=await fetch('uutiset-api.php',{method:'POST',body:fd});
  const data=await r.json();
  btn.disabled=false;
  if(data.ok){
    document.getElementById('f-title').value='';
    document.getElementById('f-body').value='';
    showToast('Uutinen julkaistu!');
    await loadPosts();
  }else showToast('Virhe tallennuksessa.');
}

async function togglePost(id){
  const fd=new FormData();
  fd.append('token',PW_HASH);fd.append('action','toggle');fd.append('id',id);
  const r=await fetch('uutiset-api.php',{method:'POST',body:fd});
  const data=await r.json();
  if(data.ok){
    showToast(data.published?'Julkaisu näkyy nyt sivustolla.':'Julkaisu piilotettu.');
    await loadPosts();
  }
}

async function deletePost(id){
  if(!confirm('Haluatko varmasti poistaa tämän julkaisun? Tätä ei voi perua.'))return;
  const fd=new FormData();
  fd.append('token',PW_HASH);fd.append('action','delete');fd.append('id',id);
  const r=await fetch('uutiset-api.php',{method:'POST',body:fd});
  const data=await r.json();
  if(data.ok){showToast('Julkaisu poistettu.');await loadPosts();}
}

async function sha256(str){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function login(){
  const v=document.getElementById('pw').value;
  const err=document.getElementById('login-err');
  const hash=await sha256(v);
  if(hash===PW_HASH){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app').style.display='block';
    err.style.display='none';
    document.getElementById('f-date').valueAsDate=new Date();
    await loadPosts();
    loadBookings();
  } else {
    err.style.display='block';
    document.getElementById('pw').value='';
  }
}

function logout(){
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('pw').value='';
  // Reset to varaukset tab
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===0));
  document.getElementById('tab-varaukset').style.display='block';
  document.getElementById('tab-uutiset').style.display='none';
}

function switchTab(name, btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-uutiset').style.display  = name==='uutiset'  ? 'block' : 'none';
  document.getElementById('tab-varaukset').style.display = name==='varaukset' ? 'block' : 'none';
  if(name==='varaukset') loadBookings();
}

/* ── Bookings ── */
const PALVELUT={perushuolto:'Perushuolto',tayshuolto:'Täyshuolto',sahko_huolto:'Sähköpyörän huolto',rengaskorjaus:'Rengaskorjaus',muu:'Muu'};
const PYORAT  ={tavallinen:'Polkupyörä',sahkopyora:'Sähköpyörä',lapsi:'Lasten pyörä',muu:'Muu'};
const TILAT   ={uusi:{l:'Uusi',c:'tl-uusi'},vahvistettu:{l:'Vahvistettu',c:'tl-vahv'},valmis:{l:'Valmis',c:'tl-valmis'},peruttu:{l:'Peruttu',c:'tl-per'}};
const BK_KK   =['tammikuuta','helmikuuta','maaliskuuta','huhtikuuta','toukokuuta','kesäkuuta','heinäkuuta','elokuuta','syyskuuta','lokakuuta','marraskuuta','joulukuuta'];
let bkFilter='tulevat';

function bkFmt(s){const[y,m,d]=s.split('-');return `${parseInt(d)}. ${BK_KK[parseInt(m)-1]} ${y}`;}

function setBkFilter(f,btn){
  bkFilter=f;
  document.querySelectorAll('.bk-filter').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  loadBookings();
}

function loadBookings(){
  document.getElementById('bk-area').innerHTML='<p class="bk-loading">Ladataan...</p>';
  fetch(`varaukset-api.php?token=${PW_HASH}&filter=${bkFilter}`)
    .then(r=>r.json())
    .then(data=>{
      if(data.error==='db_connect'||data.error==='db_error'){
        document.getElementById('bk-area').innerHTML='<div class="bk-err">Tietokantayhteyttä ei saatu. Tarkista <strong>varaukset-api.php</strong>:n DB-asetukset.</div>';
        return;
      }
      if(data.error==='unauthorized'){
        document.getElementById('bk-area').innerHTML='<div class="bk-err">Kirjautumisvirhe. Kirjaudu uudelleen sisään.</div>';
        return;
      }
      renderBookings(data.bookings||[]);
    })
    .catch(()=>{
      document.getElementById('bk-area').innerHTML='<div class="bk-err">Palvelinta ei tavoitettu. Varmista, että sivu on PHP-palvelimella (ei file://).</div>';
    });
}

function renderBookings(list){
  const area=document.getElementById('bk-area');
  if(!list.length){area.innerHTML='<p class="bk-empty">Ei varauksia tällä hakuehdolla.</p>';return;}
  area.innerHTML=list.map(b=>{
    const t=TILAT[b.tila]||{l:b.tila,c:''};
    const acts=[];
    if(b.tila!=='valmis'&&b.tila!=='peruttu')
      acts.push(`<button class="bk-btn bk-valmis" onclick="updateBk(${b.id},'valmis')">Valmis</button>`);
    if(b.tila!=='peruttu')
      acts.push(`<button class="bk-btn bk-peru" onclick="updateBk(${b.id},'peruttu')">Peru</button>`);
    if(b.tila==='peruttu'||b.tila==='valmis')
      acts.push(`<button class="bk-btn bk-palauta" onclick="updateBk(${b.id},'uusi')">Palauta</button>`);
    const extra=b.lisatiedot?` &middot; <em>${esc(b.lisatiedot)}</em>`:'';
    return `<div class="bk-card">
  <div class="bk-head">
    <div><span class="bk-date">${bkFmt(b.toivottu_pvm)}</span> <span class="bk-time">klo ${esc(b.toivottu_aika)}</span></div>
    <span class="${t.c}">${t.l}</span>
  </div>
  <div class="bk-info">
    <div><strong>${esc(b.nimi)}</strong> &middot; <a href="tel:${esc(b.puhelin)}">${esc(b.puhelin)}</a> &middot; <a href="mailto:${esc(b.email)}">${esc(b.email)}</a></div>
    <div style="color:var(--muted);margin-top:.15rem">${esc(PALVELUT[b.palvelu]||b.palvelu)} &middot; ${esc(PYORAT[b.pyora_tyyppi]||b.pyora_tyyppi)}${extra}</div>
  </div>
  <div class="bk-actions">${acts.join('')}</div>
</div>`;
  }).join('');
}

function updateBk(id,tila){
  const fd=new FormData();
  fd.append('token',PW_HASH);
  fd.append('id',id);
  fd.append('tila',tila);
  fetch('varaukset-api.php',{method:'POST',body:fd})
    .then(r=>r.json())
    .then(d=>{
      if(d.ok){showToast('Tila päivitetty.');loadBookings();}
      else showToast('Virhe päivityksessä.');
    })
    .catch(()=>showToast('Yhteysvirhe.'));
}
</script>
</body>
</html>
